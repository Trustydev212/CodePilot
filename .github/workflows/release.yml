# CodePilot Release Template
# Triggers when you push a version tag: git tag v1.0.0 && git push --tags

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi

          FEATURES=$(echo "$COMMITS" | grep -i "^- feat" || true)
          FIXES=$(echo "$COMMITS" | grep -i "^- fix" || true)
          OTHER=$(echo "$COMMITS" | grep -iv "^- feat\|^- fix" || true)

          {
            echo "changelog<<EOF"
            [ -n "$FEATURES" ] && echo "### Features" && echo "$FEATURES" && echo ""
            [ -n "$FIXES" ] && echo "### Bug Fixes" && echo "$FIXES" && echo ""
            [ -n "$OTHER" ] && echo "### Other Changes" && echo "$OTHER" && echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: true

