# CodePilot Toolkit CI
# Validates skills, hooks, and project structure

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Toolkit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          required_files=(
            "CLAUDE.md"
            "README.md"
            "LICENSE"
            "setup.sh"
            ".claude/settings.json"
            ".claude-plugin/plugin.json"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "FAIL: Missing required file: $f"
              exit 1
            fi
            echo "OK: $f"
          done
          echo "All required files present."

      - name: Validate SKILL.md frontmatter
        run: |
          echo "Checking all SKILL.md files have valid frontmatter..."
          errors=0
          count=0
          while IFS= read -r -d '' file; do
            count=$((count + 1))
            # Check file starts with ---
            if ! head -1 "$file" | grep -q '^---$'; then
              echo "FAIL: $file - missing YAML frontmatter"
              errors=$((errors + 1))
              continue
            fi
            # Check has closing ---
            if ! awk 'NR>1' "$file" | grep -q '^---$'; then
              echo "FAIL: $file - unclosed YAML frontmatter"
              errors=$((errors + 1))
              continue
            fi
            # Check has name field
            if ! sed -n '1,/^---$/p' "$file" | grep -q '^name:'; then
              echo "FAIL: $file - missing 'name' in frontmatter"
              errors=$((errors + 1))
              continue
            fi
            # Check has description field
            if ! sed -n '1,/^---$/p' "$file" | grep -q '^description:'; then
              echo "FAIL: $file - missing 'description' in frontmatter"
              errors=$((errors + 1))
              continue
            fi
            echo "OK: $file"
          done < <(find .claude/skills -name 'SKILL.md' -print0)
          echo ""
          echo "Checked $count skill files, $errors errors."
          if [ $errors -gt 0 ]; then exit 1; fi

      - name: Validate hooks are executable
        run: |
          echo "Checking hooks..."
          errors=0
          for hook in .claude/hooks/*.sh; do
            if [ ! -f "$hook" ]; then continue; fi
            # Check shebang
            if ! head -1 "$hook" | grep -q '^#!/'; then
              echo "FAIL: $hook - missing shebang line"
              errors=$((errors + 1))
            else
              echo "OK: $hook"
            fi
          done
          if [ $errors -gt 0 ]; then exit 1; fi

      - name: Validate JSON files
        run: |
          echo "Checking JSON files..."
          for f in .claude/settings.json .claude-plugin/plugin.json; do
            if python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "OK: $f"
            else
              echo "FAIL: $f - invalid JSON"
              exit 1
            fi
          done

      - name: Check setup.sh syntax
        run: bash -n setup.sh && echo "OK: setup.sh syntax valid"

      - name: Summary
        run: |
          skills=$(find .claude/skills -name 'SKILL.md' | wc -l)
          hooks=$(find .claude/hooks -name '*.sh' | wc -l)
          agents=$(find .claude/agents -name '*.md' | wc -l)
          rules=$(find .claude/rules -name '*.md' | wc -l)
          echo "=== CodePilot Toolkit ==="
          echo "Skills: $skills"
          echo "Hooks:  $hooks"
          echo "Agents: $agents"
          echo "Rules:  $rules"
          echo "All checks passed."
