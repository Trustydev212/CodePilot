# CodePilot CI Template
# Copy this file to your project's .github/workflows/ci.yml
# Customize the sections marked with "# CONFIGURE:" comments

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # CONFIGURE: Uncomment your package manager
          # cache: 'npm'
          # cache: 'pnpm'
          # cache: 'yarn'

      # CONFIGURE: Uncomment for pnpm
      # - uses: pnpm/action-setup@v4
      #   with:
      #     version: 9

      - run: npm ci
      - run: npx eslint . --max-warnings 0
      - run: npx prettier --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # CONFIGURE: Uncomment for pnpm
      # - uses: pnpm/action-setup@v4

      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # CONFIGURE: Uncomment for pnpm
      # - uses: pnpm/action-setup@v4

      - run: npm ci
      - run: npm test -- --coverage
        env:
          CI: true

      - name: Upload coverage
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # CONFIGURE: Uncomment for pnpm
      # - uses: pnpm/action-setup@v4

      - run: npm ci
      - run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            dist/
            .next/
            build/
